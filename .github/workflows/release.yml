name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

env:
  IMAGE_NAME: a3

permissions:
  contents: write
  packages: write

jobs:
  binaries:
    name: Build ${{ matrix.goos }}/${{ matrix.goarch }}
    runs-on: ${{ matrix.runner }}
    # a3 depends on github.com/mattn/go-sqlite3, which requires cgo. Every
    # target must be built with CGO_ENABLED=1 on a runner that has a matching
    # C toolchain, otherwise the published binary ships a non-functional sqlite
    # stub that fails at runtime ("compiled with CGO_ENABLED=0 ... requires cgo").
    strategy:
      fail-fast: false
      matrix:
        include:
          - goos: linux
            goarch: amd64
            runner: ubuntu-latest
          - goos: linux
            goarch: arm64
            runner: ubuntu-latest
            cc: aarch64-linux-gnu-gcc
            apt: gcc-aarch64-linux-gnu
          - goos: darwin
            goarch: amd64
            runner: macos-13      # Intel runner -> native cgo
          - goos: darwin
            goarch: arm64
            runner: macos-14      # Apple Silicon runner -> native cgo
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.25'
          cache: true

      - name: Install cross toolchain
        if: matrix.apt != ''
        run: |
          sudo apt-get update
          sudo apt-get install -y ${{ matrix.apt }}

      - name: Get build info
        id: info
        run: |
          echo "version=${GITHUB_REF_NAME#v}" >> $GITHUB_OUTPUT
          echo "commit=$(git rev-parse --short HEAD)" >> $GITHUB_OUTPUT
          echo "build_time=$(date -u '+%Y-%m-%dT%H:%M:%SZ')" >> $GITHUB_OUTPUT

      - name: Build binary
        env:
          CGO_ENABLED: '1'
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CC: ${{ matrix.cc }}
          LDFLAGS: >-
            -s -w
            -X main.version=${{ steps.info.outputs.version }}
            -X main.commit=${{ steps.info.outputs.commit }}
            -X main.buildTime=${{ steps.info.outputs.build_time }}
        run: |
          mkdir -p dist
          go build -ldflags "$LDFLAGS" -o dist/a3-${{ matrix.goos }}-${{ matrix.goarch }} ./cmd/a3/

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: a3-${{ matrix.goos }}-${{ matrix.goarch }}
          path: dist/a3-${{ matrix.goos }}-${{ matrix.goarch }}
          if-no-files-found: error

  release:
    runs-on: ubuntu-latest
    needs: binaries
    steps:
      - name: Download all binaries
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*
          generate_release_notes: true

  container:
    runs-on: ubuntu-latest
    needs: binaries
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-qemu-action@v3

      - uses: docker/setup-buildx-action@v3

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: |
            ghcr.io/${{ github.repository_owner }}/${{ env.IMAGE_NAME }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Get build info
        id: info
        run: |
          echo "version=${GITHUB_REF_NAME#v}" >> $GITHUB_OUTPUT
          echo "commit=$(git rev-parse --short HEAD)" >> $GITHUB_OUTPUT
          echo "build_time=$(date -u '+%Y-%m-%dT%H:%M:%SZ')" >> $GITHUB_OUTPUT

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          platforms: linux/amd64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            VERSION=${{ steps.info.outputs.version }}
            COMMIT=${{ steps.info.outputs.commit }}
            BUILD_TIME=${{ steps.info.outputs.build_time }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
